<style>
    /* ... (Behåll din tidigare blå-röda bas-styling) ... */
    #track-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        width: 100%;
        max-width: 1400px;
        margin-top: 50px;
    }

    .track-card {
        background: #0f0f0f;
        border-left: 2px solid #222;
        padding: 15px;
        text-align: left;
        transition: 0.3s;
        opacity: 0; /* För animationen */
        transform: translateY(15px);
        animation: slideUp 0.4s forwards;
    }

    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .track-card:hover {
        background: #151515;
        border-left-color: var(--red);
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
    }

    .track-title { color: var(--blue); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { color: #888; font-size: 0.8rem; }
    a { text-decoration: none; color: inherit; }
</style>

<script>
    async function scanFrequency() {
        const grid = document.getElementById('track-grid');
        const vu = document.getElementById('vu');
        grid.innerHTML = '';
        vu.classList.add('active');

        try {
            const res = await fetch('/api/get-tracks');
            const tracks = await res.json();
            
            vu.classList.remove('active');

            tracks.forEach((track, index) => {
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = 'track-card';
                    card.innerHTML = `
                        <a href="${track.link}" target="_blank">
                            <div class="track-title">${track.name}</div>
                            <div class="track-artist">${track.artist}</div>
                        </a>`;
                    grid.appendChild(card);
                }, index * 20); // Skapar "vattenfallet"
            });
        } catch (e) {
            vu.classList.remove('active');
            alert('Signal lost. Try again.');
        }
    }
</script>
